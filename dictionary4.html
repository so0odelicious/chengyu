<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成語單子 · Idioms Dictionary</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="dictionary-page">
        <p class="dict-eyebrow">Codex · 詞典</p>
        <h1>成語單子</h1>
        <p class="dict-sub">Tap any tile to learn more about the idiom.</p>

        <div class="idioms-container" id="idiomsContainer"></div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="idiom-card" id="idiomCard">
        <span id="closeCardBtn" class="close-btn">&times;</span>
        <img id="idiomImg" src="" alt="Idiom Image">
        <h2 id="idiomText"></h2>
        <p id="idiomDefinition"></p>
        <p id="idiomExample"></p>
        <div class="navigation-buttons">
            <button id="prevIdiomBtn">← prev</button>
            <button id="nextIdiomBtn">next →</button>
        </div>
    </div>

    <button id="backToStartBtn">← home</button>

    <script src="idiomsMasterList.js"></script>
    <script src="dictionary4.js"></script>
</body>
</html>
