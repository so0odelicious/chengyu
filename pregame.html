<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Idioms Challenge - Start</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to your CSS file -->
</head>
<body>
    <div class="pregame-page">

        <h1></h1>
        <img src="homepage2.jpg" alt="title">
        <p></p>
        <button class="game-btn" data-level="short">
            Play Quick Game
        </button>

        <button class="game-btn" data-level="l1">
            Idioms 1–25
        </button>

        <button class="game-btn" data-level="l2">
            Idioms 26–50
        </button>

    <div>  <button id="backToStartBtn">Home</button> </div>  

    </div>

    <script>

        document.addEventListener("DOMContentLoaded", () => {
        
            // all game buttons
            const gameButtons =
                document.querySelectorAll(".game-btn");
        
            gameButtons.forEach(button => {
        
                button.addEventListener("click", () => {
        
                    const level = button.dataset.level;
        
                    window.location.href =
                        `chengyu.html?level=${level}`;
                });
        
            });
        
            // home button
            document.getElementById("backToStartBtn")
                .addEventListener("click", () => {
        
                    window.location.href = "index.html";
                });
        
        });
        
        </script>

</body>
</html>
