<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成語遊戲 — Choose Your Fate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="pregame-page">
        <!-- legacy: hidden by CSS -->
        <h1></h1>
        <p></p>
        <img src="homepage2.jpg" alt="title" hidden>

        <div class="fate-grid">
            <button class="fate-card game-btn" data-level="short">
                <h3 class="fate-title" lang="zh-Hant">快速</h3>
                <div class="fate-en">Quick Game</div>
                <div class="fate-foot">5 random idioms</div>
            </button>

            <button class="fate-card game-btn" data-level="l1">
                <h3 class="fate-title" lang="zh-Hant">上冊</h3>
                <div class="fate-en">Idioms 1 – 25</div>
                <div class="fate-foot">25 idioms</div>
            </button>

            <button class="fate-card game-btn" data-level="l2">
                <h3 class="fate-title" lang="zh-Hant">下冊</h3>
                <div class="fate-en">Idioms 26 – 50</div>
                <div class="fate-foot">25 idioms</div>
            </button>
        </div>

        <div class="page-foot">
            <button id="backToStartBtn" class="btn btn--ghost">← back to the gate</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const gameButtons = document.querySelectorAll(".game-btn");
            gameButtons.forEach(button => {
                button.addEventListener("click", () => {
                    const level = button.dataset.level;
                    window.location.href = `chengyu.html?level=${level}`;
                });
            });

            document.getElementById("backToStartBtn")
                .addEventListener("click", () => {
                    window.location.href = "index.html";
                });
        });
    </script>
</body>
</html>
